<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>422 — shorty</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', system-ui, sans-serif;
      background-color: #f2f2f2;
      background-image:
        radial-gradient(circle, rgba(26,107,69,0.14) 1.5px, transparent 1.5px),
        radial-gradient(circle, rgba(26,107,69,0.07) 1.5px, transparent 1.5px);
      background-size: 28px 28px;
      background-position: 0 0, 14px 14px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      color: #111;
      -webkit-font-smoothing: antialiased;
    }
    nav { background: #fff; border-bottom: 1px solid #e0e0e0; padding: 0 1.5rem; height: 58px; display: flex; align-items: center; }
    .brand { font-size: 1.05rem; font-weight: 600; color: #111; text-decoration: none; letter-spacing: -0.01em; }
    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem 1.5rem; }
    .card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 3rem 2.5rem;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 1px 6px rgba(0,0,0,.06);
    }
    .code { font-size: 4.5rem; font-weight: 600; color: #d97706; letter-spacing: -0.05em; line-height: 1; margin-bottom: 1rem; }
    h1 { font-size: 1.3rem; font-weight: 500; margin-bottom: 0.6rem; letter-spacing: -0.02em; }
    p { font-size: 0.9rem; font-weight: 300; color: #777; line-height: 1.6; margin-bottom: 2rem; }
    a.btn { display: inline-block; padding: 0.65rem 1.5rem; background: #1a6b45; color: #fff; border-radius: 8px; text-decoration: none; font-size: 0.9rem; font-weight: 500; }
    a.btn:hover { background: #145537; }
    footer { text-align: center; padding: 1rem; font-size: 0.75rem; color: #aaa; border-top: 1px solid #e0e0e0; background: #fff; }
  </style>
</head>
<body>
  <nav><a href="/" class="brand">shorty</a></nav>
  <main>
    <div class="card">
      <div class="code">422</div>
      <h1>Request not accepted</h1>
      <p>The form submission was invalid or your session may have expired. Please go back and try again.</p>
      <a href="/" class="btn">← Back to shorty</a>
    </div>
  </main>
  <footer>shorty</footer>
</body>
</html>
